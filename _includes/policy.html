{% include "header.html" %}

<div class="l-container">
	<main class="l-main">
		<div class="p-article">
			<h1>{{ title }}</h1>
			<!-- 本文 -->
			<article class="p-article__body">
				{{ content }}
			</article>
			<p class="p-article__meta">
				【制定日】{{ date | date: "%Y年%m月%d日" }}<br>
				【サイト名】{{ siteName }}
			</p>
			<div class="p-article__return">
				<a href="/" class="p-btn p-btn--return">サイトトップに戻る</a>
			</div>
		</div>
	</main>
</div>
